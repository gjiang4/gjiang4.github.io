<style>
:root{--bg:#0b0d12;--card:#161a22;--ink:#eef1f5;--mut:#9aa3af;--line:#242a35;
--gold:#ffce5c;--grn:#39d98a;--blu:#7fd1ff;}
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(1100px 560px at 50% -10%,#1a2336,#0b0d12);
color:var(--ink);font:17px/1.55 -apple-system,BlinkMacSystemFont,"PingFang TC","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100vh;display:flex;justify-content:center;padding:46px 18px 60px}
.wrap{max-width:480px;width:100%;text-align:center}
.av{width:96px;height:96px;border-radius:50%;object-fit:cover;margin:0 auto 14px;border:2px solid var(--line);background:#1b2230}
h1{font-size:24px;margin:0 0 4px;letter-spacing:-.2px}
.tag{color:var(--mut);font-size:14px;margin:0 0 4px}
.tag-en{color:#6f7886;font-size:12.5px;margin:0 0 26px}
a.lnk{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:0 0 13px;
font-weight:700;transition:.15s;text-align:left}
a.lnk:hover{border-color:#3a4658;transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
a.lnk .ic{font-size:22px;width:26px;text-align:center;flex:0 0 26px}
a.lnk .tx{flex:1}
a.lnk .tx .sub{display:block;color:var(--mut);font-weight:500;font-size:12px;margin-top:1px}
a.lnk .arrow{color:var(--mut);font-size:16px}
a.hero{background:linear-gradient(135deg,#2a2410,#1c1a14);border-color:#5a4a1e}
a.hero .ic{color:var(--gold)}
a.hero:hover{border-color:var(--gold)}
.foot{color:#566;font-size:11.5px;margin-top:26px}
</style></head>
